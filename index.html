<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#070b18" />
  <title>MoZ Launch</title>
  <style>
    :root{
      --bg0:#050814;
      --bg1:#08111f;
      --bg2:#0f1a33;
      --glass:rgba(255,255,255,.08);
      --glass2:rgba(255,255,255,.12);
      --line:rgba(255,255,255,.14);
      --text:#f4f7ff;
      --muted:rgba(244,247,255,.68);
      --accent:#7dd3fc;
      --accent2:#a78bfa;
      --good:#34d399;
      --shadow:0 24px 80px rgba(0,0,0,.40);
      --r24:24px;
      --r28:28px;
      --r999:999px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      min-height:100%;
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 10% 5%, rgba(125,211,252,.14), transparent 28%),
        radial-gradient(circle at 90% 15%, rgba(167,139,250,.16), transparent 28%),
        radial-gradient(circle at 50% 95%, rgba(52,211,153,.08), transparent 24%),
        linear-gradient(135deg, var(--bg0), var(--bg1) 48%, var(--bg2));
      overflow-x:hidden;
      user-select:none;
      -webkit-user-select:none;
      overscroll-behavior:none;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(120deg, rgba(255,255,255,.04), transparent 28%, rgba(255,255,255,.02)),
        radial-gradient(circle at 50% 0%, rgba(255,255,255,.07), transparent 40%);
      z-index:0;
    }

    canvas{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      pointer-events:none;
      display:block;
    }

    #bgCanvas{z-index:0;}
    #fxCanvas{z-index:1;}

    .app{
      position:relative;
      z-index:2;
      min-height:100vh;
      padding:20px;
    }

    .wrap{
      width:min(1280px, 100%);
      margin:0 auto;
      display:grid;
      gap:16px;
    }

    .hero, .toolbar{
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.06));
      backdrop-filter:blur(24px) saturate(160%);
      -webkit-backdrop-filter:blur(24px) saturate(160%);
      box-shadow:var(--shadow);
    }

    .hero{
      border-radius:34px;
      padding:18px;
      animation:enter .75s ease both;
    }

    .heroRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      min-width:0;
    }

    .logo{
      width:54px;
      height:54px;
      border-radius:18px;
      display:grid;
      place-items:center;
      font-size:24px;
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,.55), transparent 32%),
        linear-gradient(135deg, rgba(125,211,252,.95), rgba(167,139,250,.95));
      box-shadow:0 16px 32px rgba(125,211,252,.22);
      flex:0 0 auto;
    }

    .brand h1{
      margin:0;
      font-size:1.15rem;
      line-height:1.1;
      letter-spacing:.2px;
    }

    .brand p{
      margin:5px 0 0;
      color:var(--muted);
      font-size:.93rem;
      line-height:1.35;
    }

    .chips{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
    }

    .chip{
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.06);
      color:var(--text);
      padding:10px 14px;
      border-radius:999px;
      font-size:.9rem;
      font-weight:700;
      display:inline-flex;
      align-items:center;
      gap:8px;
      cursor:pointer;
      transition:transform .18s ease, background .18s ease, border-color .18s ease, box-shadow .18s ease;
    }

    .chip:hover, .chip.active{
      transform:translateY(-1px);
      background:rgba(255,255,255,.13);
      border-color:rgba(125,211,252,.34);
      box-shadow:0 10px 24px rgba(0,0,0,.16);
    }

    .toolbar{
      border-radius:28px;
      padding:14px;
      display:grid;
      grid-template-columns:1fr auto;
      gap:12px;
      animation:enter .85s ease both;
    }

    .search{
      position:relative;
      min-width:0;
    }

    .search svg{
      position:absolute;
      left:16px;
      top:50%;
      transform:translateY(-50%);
      opacity:.8;
    }

    .search input{
      width:100%;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(8,13,26,.48);
      color:var(--text);
      padding:15px 16px 15px 48px;
      border-radius:18px;
      outline:none;
      font-size:1rem;
      transition:border-color .18s ease, box-shadow .18s ease, transform .18s ease;
      user-select:text;
      -webkit-user-select:text;
    }

    .search input:focus{
      border-color:rgba(125,211,252,.42);
      box-shadow:0 0 0 4px rgba(125,211,252,.12);
      transform:translateY(-1px);
    }

    .count{
      align-self:center;
      white-space:nowrap;
      color:var(--muted);
      font-weight:700;
      padding:12px 16px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
      gap:16px;
      padding-bottom:8px;
    }

    .card{
      position:relative;
      overflow:hidden;
      border-radius:30px;
      border:1px solid rgba(255,255,255,.12);
      background:
        linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.06)),
        rgba(255,255,255,.05);
      backdrop-filter:blur(26px) saturate(160%);
      -webkit-backdrop-filter:blur(26px) saturate(160%);
      box-shadow:var(--shadow);
      padding:18px;
      opacity:0;
      transform:translateY(16px) scale(.985);
      animation:cardIn .72s ease forwards;
      transition:transform .2s ease, border-color .2s ease, box-shadow .2s ease;
    }

    .card:hover{
      transform:translateY(-4px) scale(1);
      border-color:rgba(125,211,252,.28);
      box-shadow:0 28px 70px rgba(0,0,0,.40);
    }

    .shine{
      position:absolute;
      inset:auto -35% -45% auto;
      width:220px;
      height:220px;
      background:radial-gradient(circle, rgba(125,211,252,.16), transparent 68%);
      pointer-events:none;
      filter:blur(8px);
    }

    .head{
      display:flex;
      gap:14px;
      align-items:flex-start;
      margin-bottom:12px;
    }

    .icon{
      width:56px;
      height:56px;
      border-radius:18px;
      display:grid;
      place-items:center;
      font-size:29px;
      flex:0 0 auto;
      background:
        radial-gradient(circle at 30% 20%, rgba(255,255,255,.32), transparent 30%),
        linear-gradient(135deg, rgba(125,211,252,.18), rgba(167,139,250,.18));
      border:1px solid rgba(255,255,255,.14);
    }

    .title{
      min-width:0;
      flex:1;
    }

    .titleRow{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .titleRow h2{
      margin:0;
      font-size:1.08rem;
      line-height:1.2;
    }

    .tag{
      display:inline-flex;
      align-items:center;
      border-radius:999px;
      padding:6px 10px;
      font-size:.78rem;
      font-weight:800;
      background:rgba(52,211,153,.14);
      border:1px solid rgba(52,211,153,.22);
      color:#dcfff2;
      letter-spacing:.2px;
    }

    .desc{
      margin:0;
      color:var(--muted);
      line-height:1.55;
      font-size:.96rem;
      min-height:3lh;
    }

    .meta{
      margin-top:15px;
      padding-top:13px;
      border-top:1px solid rgba(255,255,255,.10);
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      color:rgba(244,247,255,.82);
      font-size:.9rem;
    }

    .meta span{
      display:inline-flex;
      align-items:center;
      gap:7px;
    }

    .launch{
      margin-top:14px;
      width:100%;
      border:0;
      border-radius:18px;
      padding:13px 14px;
      font-weight:900;
      font-size:.98rem;
      color:#fff;
      cursor:pointer;
      background:linear-gradient(135deg, rgba(125,211,252,.95), rgba(167,139,250,.95));
      box-shadow:0 14px 28px rgba(125,211,252,.18);
      transition:transform .18s ease, filter .18s ease, opacity .18s ease;
    }

    .launch:hover{transform:translateY(-1px);filter:brightness(1.03);}
    .launch:disabled{opacity:.82;cursor:wait;transform:none;}

    .progress{
      display:none;
      margin-top:14px;
      gap:10px;
    }

    .progress.active{display:grid;}

    .progressTop{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      font-size:.88rem;
      color:rgba(244,247,255,.86);
    }

    .bar{
      width:100%;
      height:11px;
      border-radius:999px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.08);
    }

    .bar > span{
      display:block;
      height:100%;
      width:0%;
      border-radius:inherit;
      background:linear-gradient(90deg, rgba(52,211,153,.95), rgba(125,211,252,.95), rgba(167,139,250,.95));
      transition:width .16s linear;
    }

    .empty{
      grid-column:1/-1;
      padding:34px 20px;
      text-align:center;
      color:var(--muted);
      border-radius:28px;
      border:1px dashed rgba(255,255,255,.16);
      background:rgba(255,255,255,.04);
      backdrop-filter:blur(16px);
    }

    .modal{
      position:fixed;
      inset:0;
      display:none;
      place-items:center;
      padding:20px;
      background:rgba(5,8,20,.52);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      z-index:20;
    }

    .modal.active{display:grid;}

    .modalCard{
      width:min(520px, 100%);
      border-radius:30px;
      border:1px solid rgba(255,255,255,.14);
      background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.08));
      box-shadow:0 28px 90px rgba(0,0,0,.50);
      padding:22px;
      animation:pop .25s ease both;
    }

    .modalHead{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:16px;
    }

    .modalTitle{
      margin:0;
      font-size:1.15rem;
    }

    .modalSub{
      margin:5px 0 0;
      color:var(--muted);
      line-height:1.5;
      font-size:.95rem;
    }

    .close{
      width:42px;
      height:42px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.07);
      color:#fff;
      font-size:20px;
      cursor:pointer;
    }

    .stage{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      color:rgba(244,247,255,.9);
      font-weight:700;
      font-size:.92rem;
      margin:8px 0 12px;
    }

    .hint{
      margin-top:12px;
      color:rgba(244,247,255,.58);
      font-size:.85rem;
      line-height:1.45;
    }

    .footer{
      text-align:center;
      color:rgba(244,247,255,.48);
      font-size:.84rem;
      padding:4px 0 10px;
    }

    ::selection{background:rgba(125,211,252,.25);color:#fff;}
    ::-moz-selection{background:rgba(125,211,252,.25);color:#fff;}
    img, a, button, input{ -webkit-user-drag:none; }

    @keyframes enter{
      from{opacity:0;transform:translateY(-10px);}
      to{opacity:1;transform:translateY(0);}
    }
    @keyframes cardIn{
      to{opacity:1;transform:translateY(0) scale(1);}
    }
    @keyframes pop{
      from{opacity:0;transform:translateY(10px) scale(.96);}
      to{opacity:1;transform:translateY(0) scale(1);}
    }

    @media (max-width:760px){
      .hero, .toolbar{border-radius:26px;}
      .toolbar{grid-template-columns:1fr;}
      .count{justify-self:start;}
      .chips{justify-content:flex-start;}
    }
  </style>
</head>
<body>
  <canvas id="bgCanvas"></canvas>
  <canvas id="fxCanvas"></canvas>

  <main class="app">
    <div class="wrap">
      <section class="hero">
        <div class="heroRow">
          <div class="brand">
            <div class="logo">⚡</div>
            <div>
              <h1 id="appTitle">Z Launch</h1>
              <p id="appSubtitle">Search, browse, and launch from a clean glass UI.</p>
            </div>
          </div>

          <div class="chips" role="tablist" aria-label="Categories">
            <button class="chip active" data-filter="All" type="button"><span>◎</span> All</button>
            <button class="chip" data-filter="Games" type="button"><span>🎮</span> Games</button>
            <button class="chip" data-filter="Apps" type="button"><span>▣</span> Apps</button>
          </div>
        </div>
      </section>

      <section class="toolbar">
        <div class="search">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M21 21l-4.35-4.35" stroke="rgba(255,255,255,.82)" stroke-width="2" stroke-linecap="round"/>
            <circle cx="11" cy="11" r="7" stroke="rgba(255,255,255,.82)" stroke-width="2"/>
          </svg>
          <input id="searchInput" type="text" placeholder="Search games, apps, names, or descriptions..." autocomplete="off" />
        </div>
        <div class="count" id="countBadge">0 items</div>
      </section>

      <section id="grid" class="grid" aria-live="polite"></section>
      <div class="footer">Tap Launch to show the loading flow with random 2–8 second completion.</div>
    </div>
  </main>

  <div id="modal" class="modal" aria-hidden="true">
    <div class="modalCard">
      <div class="modalHead">
        <div>
          <h3 class="modalTitle" id="modalTitle">Launching…</h3>
          <p class="modalSub" id="modalSub">Preparing task</p>
        </div>
        <button class="close" id="closeModal" type="button" aria-label="Close">×</button>
      </div>

      <div class="stage">
        <span id="stageLabel">Loading Manifest.json</span>
        <span id="stagePct">0%</span>
      </div>
      <div class="bar"><span id="modalBar"></span></div>
      <div class="hint">Stages: Loading Manifest.json → Extracting Folders → Packing Bundles → Copying Link</div>
    </div>
  </div>

  <script>
    const fallbackManifest = {
      appName: "Z Launch",
      subtitle: "Search, browse, and launch from a clean glass UI.",
      lists: [
        { id: "game-skyforge", category: "Games", name: "Sky Forge", description: "Fast-paced adventure with smooth combat, bright visuals, and quick access.", date: "2026-05-01", size: "1.8 GB", icon: "🎮", link: "#sky-forge" },
        { id: "game-neondrift", category: "Games", name: "Neon Drift", description: "Arcade racing with responsive controls, city lights, and short session play.", date: "2026-05-01", size: "924 MB", icon: "🏎️", link: "#neon-drift" },
        { id: "app-vaultnotes", category: "Apps", name: "Vault Notes", description: "Minimal note-taking and organizer app with offline-ready performance.", date: "2026-05-01", size: "56 MB", icon: "📝", link: "#vault-notes" },
        { id: "app-pulsestudio", category: "Apps", name: "Pulse Studio", description: "Creative utility for editing, previewing, and sharing media assets.", date: "2026-05-01", size: "312 MB", icon: "✨", link: "#pulse-studio" }
      ]
    };

    const state = {
      manifest: fallbackManifest,
      filter: "All",
      query: ""
    };

    const grid = document.getElementById("grid");
    const searchInput = document.getElementById("searchInput");
    const countBadge = document.getElementById("countBadge");
    const appTitle = document.getElementById("appTitle");
    const appSubtitle = document.getElementById("appSubtitle");
    const chips = [...document.querySelectorAll(".chip")];

    const modal = document.getElementById("modal");
    const modalTitle = document.getElementById("modalTitle");
    const modalSub = document.getElementById("modalSub");
    const stageLabel = document.getElementById("stageLabel");
    const stagePct = document.getElementById("stagePct");
    const modalBar = document.getElementById("modalBar");
    const closeModal = document.getElementById("closeModal");

    let activeLaunch = null;
    let rafId = 0;

    function esc(v){
      return String(v ?? "").replace(/[<>]/g, "");
    }

    function fmtDate(v){
      try{
        return new Intl.DateTimeFormat(undefined, { year:"numeric", month:"short", day:"numeric" }).format(new Date(v));
      }catch{
        return esc(v);
      }
    }

    function normalizeText(item){
      return [
        item.name, item.description, item.category, item.size, item.date
      ].join(" ").toLowerCase();
    }

    function filteredItems(){
      const q = state.query.trim().toLowerCase();
      return (state.manifest?.lists || []).filter(item => {
        const categoryOk = state.filter === "All" || esc(item.category) === state.filter;
        const queryOk = !q || normalizeText(item).includes(q);
        return categoryOk && queryOk;
      });
    }

    function render(){
      const items = filteredItems();
      grid.innerHTML = "";
      countBadge.textContent = `${items.length} item${items.length === 1 ? "" : "s"}`;

      if(!items.length){
        grid.innerHTML = `<div class="empty">No matching items found.</div>`;
        return;
      }

      items.forEach((item, index) => {
        const card = document.createElement("article");
        card.className = "card";
        card.style.animationDelay = `${index * 55}ms`;

        card.innerHTML = `
          <div class="shine"></div>
          <div class="head">
            <div class="icon" aria-hidden="true">${esc(item.icon || "⬡")}</div>
            <div class="title">
              <div class="titleRow">
                <h2>${esc(item.name)}</h2>
                <span class="tag">${esc(item.category || "Item")}</span>
              </div>
            </div>
          </div>
          <p class="desc">${esc(item.description)}</p>
          <div class="meta">
            <span>📅 ${fmtDate(item.date)}</span>
            <span>💾 ${esc(item.size)}</span>
          </div>
          <button class="launch" type="button">Launch</button>
          <div class="progress" aria-hidden="true">
            <div class="progressTop"><span class="pStage">Ready</span><span class="pPct">0%</span></div>
            <div class="bar"><span></span></div>
          </div>
        `;

        const btn = card.querySelector(".launch");
        const progress = card.querySelector(".progress");
        const pStage = card.querySelector(".pStage");
        const pPct = card.querySelector(".pPct");
        const bar = card.querySelector(".bar > span");

        const stages = [
          "Loading Manifest.json",
          "Extracting Folders",
          "Packing Bundles",
          "Copying Link"
        ];

        btn.addEventListener("click", () => startLaunch({
          title: esc(item.name),
          sub: esc(item.description),
          progress,
          pStage,
          pPct,
          bar,
          button: btn,
          stages,
          link: item.link
        }));

        grid.appendChild(card);
      });
    }

    function setFilter(filter){
      state.filter = filter;
      chips.forEach(c => c.classList.toggle("active", c.dataset.filter === filter));
      render();
    }

    chips.forEach(chip => chip.addEventListener("click", () => setFilter(chip.dataset.filter)));

    searchInput.addEventListener("input", () => {
      state.query = searchInput.value;
      render();
    });

    function openModal(title, sub){
      modalTitle.textContent = title || "Launching…";
      modalSub.textContent = sub || "Preparing task";
      modal.classList.add("active");
      modal.setAttribute("aria-hidden", "false");
    }

    function closeLaunchModal(){
      modal.classList.remove("active");
      modal.setAttribute("aria-hidden", "true");
    }

    closeModal.addEventListener("click", () => {
      if(activeLaunch?.button) activeLaunch.button.disabled = false;
      closeLaunchModal();
      activeLaunch = null;
    });

    modal.addEventListener("click", (e) => {
      if(e.target === modal){
        if(activeLaunch?.button) activeLaunch.button.disabled = false;
        closeLaunchModal();
        activeLaunch = null;
      }
    });

    function startLaunch(ctx){
      if(activeLaunch) return;
      activeLaunch = ctx;
      ctx.button.disabled = true;
      ctx.progress.classList.add("active");
      ctx.progress.setAttribute("aria-hidden", "false");

      openModal(ctx.title, ctx.sub);

      const duration = 2000 + Math.floor(Math.random() * 6001);
      const start = performance.now();
      const totalStages = ctx.stages.length;

      cancelAnimationFrame(rafId);

      const tick = () => {
        const elapsed = performance.now() - start;
        const progress = Math.min(100, Math.round((elapsed / duration) * 100));
        const stageIndex = Math.min(totalStages - 1, Math.floor(progress / (100 / totalStages)));

        ctx.bar.style.width = `${progress}%`;
        ctx.pPct.textContent = `${progress}%`;
        ctx.pStage.textContent = ctx.stages[stageIndex];

        stageLabel.textContent = ctx.stages[stageIndex];
        stagePct.textContent = `${progress}%`;
        modalBar.style.width = `${progress}%`;

        if(progress < 100){
          rafId = requestAnimationFrame(tick);
        } else {
          ctx.pStage.textContent = "Completed";
          stageLabel.textContent = "Completed";
          setTimeout(() => {
            ctx.progress.classList.remove("active");
            ctx.progress.setAttribute("aria-hidden", "true");
            ctx.bar.style.width = "0%";
            ctx.pPct.textContent = "0%";
            ctx.pStage.textContent = "Ready";
            modalBar.style.width = "0%";
            ctx.button.disabled = false;
            closeLaunchModal();
            if(ctx.link && ctx.link !== "#"){
              location.hash = ctx.link;
            }
            activeLaunch = null;
          }, 420);
          return;
        }
      };

      rafId = requestAnimationFrame(tick);
    }

    async function loadManifest(){
      const paths = ["./manifest.json", "/manifest.json"];
      for(const path of paths){
        try{
          const res = await fetch(path, { cache: "no-store" });
          if(!res.ok) continue;
          const data = await res.json();
          if(data && Array.isArray(data.lists)){
            state.manifest = data;
            appTitle.textContent = esc(data.appName || "Z Launch");
            appSubtitle.textContent = esc(data.subtitle || "Search, browse, and launch from a clean glass UI.");
            render();
            return;
          }
        }catch(_){}
      }
      state.manifest = fallbackManifest;
      render();
    }

    function initBackground(){
      const bg = document.getElementById("bgCanvas");
      const fx = document.getElementById("fxCanvas");
      const bctx = bg.getContext("2d");
      const fctx = fx.getContext("2d");
      let w = 0, h = 0, t = 0;

      const stars = Array.from({ length: 74 }, () => ({
        x: Math.random(),
        y: Math.random(),
        r: 0.6 + Math.random() * 1.8,
        a: 0.18 + Math.random() * 0.55,
        vx: (Math.random() - 0.5) * 0.00023,
        vy: (Math.random() - 0.5) * 0.00023
      }));

      const particles = Array.from({ length: 82 }, () => ({
        x: Math.random(),
        y: Math.random(),
        vx: (Math.random() - 0.5) * 0.0008,
        vy: (Math.random() - 0.5) * 0.0008,
        r: 1 + Math.random() * 2.4
      }));

      function resize(){
        w = bg.width = fx.width = Math.floor(window.innerWidth * devicePixelRatio);
        h = bg.height = fx.height = Math.floor(window.innerHeight * devicePixelRatio);
        bg.style.width = fx.style.width = window.innerWidth + "px";
        bg.style.height = fx.style.height = window.innerHeight + "px";
      }

      window.addEventListener("resize", resize);
      resize();

      function draw(){
        t += 0.003;

        bctx.clearRect(0,0,w,h);
        fctx.clearRect(0,0,w,h);

        const grad = bctx.createLinearGradient(0,0,w,h);
        grad.addColorStop(0, `rgba(125,211,252,${0.10 + Math.sin(t)*0.02})`);
        grad.addColorStop(.5, `rgba(167,139,250,${0.08 + Math.cos(t*1.2)*0.02})`);
        grad.addColorStop(1, `rgba(34,197,94,${0.04 + Math.sin(t*0.7)*0.012})`);
        bctx.fillStyle = grad;
        bctx.fillRect(0,0,w,h);

        for(const s of stars){
          s.x += s.vx;
          s.y += s.vy;
          if(s.x < -0.05) s.x = 1.05;
          if(s.x > 1.05) s.x = -0.05;
          if(s.y < -0.05) s.y = 1.05;
          if(s.y > 1.05) s.y = -0.05;
          bctx.beginPath();
          bctx.fillStyle = `rgba(255,255,255,${s.a})`;
          bctx.arc(s.x * w, s.y * h, s.r * devicePixelRatio, 0, Math.PI * 2);
          bctx.fill();
        }

        for(let i = 0; i < particles.length; i++){
          const p = particles[i];
          p.x += p.vx;
          p.y += p.vy;
          if(p.x < -0.1) p.x = 1.1;
          if(p.x > 1.1) p.x = -0.1;
          if(p.y < -0.1) p.y = 1.1;
          if(p.y > 1.1) p.y = -0.1;

          const x = p.x * w;
          const y = p.y * h;
          fctx.beginPath();
          fctx.fillStyle = "rgba(255,255,255,.60)";
          fctx.arc(x, y, p.r * devicePixelRatio, 0, Math.PI * 2);
          fctx.fill();

          for(let j = i + 1; j < particles.length; j++){
            const q = particles[j];
            const dx = (p.x - q.x) * w;
            const dy = (p.y - q.y) * h;
            const dist = Math.hypot(dx, dy);
            if(dist < 170 * devicePixelRatio){
              fctx.beginPath();
              fctx.strokeStyle = `rgba(125,211,252,${0.08 * (1 - dist / (170 * devicePixelRatio))})`;
              fctx.lineWidth = 1;
              fctx.moveTo(x, y);
              fctx.lineTo(q.x * w, q.y * h);
              fctx.stroke();
            }
          }
        }

        requestAnimationFrame(draw);
      }

      draw();
    }

    document.addEventListener("contextmenu", e => e.preventDefault());

    initBackground();
    loadManifest();
    render();
  </script>
</body>
</html>
